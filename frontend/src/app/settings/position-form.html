<h2 mat-dialog-title>{{ isEditMode ? 'Position bearbeiten' : 'Neue Position' }}</h2>

<mat-dialog-content>
    <div class="form-container">
        <mat-form-field appearance="outline">
            <mat-label>Positionstitel</mat-label>
            <input matInput [(ngModel)]="pos.title" placeholder="z.B. Projektmanager" />
        </mat-form-field>

        <mat-checkbox [(ngModel)]="pos.can_approve">
            Kann Abwesenheiten genehmigen
        </mat-checkbox>

        <mat-checkbox [(ngModel)]="pos.requires_dual_approval">
            4-Augen-Prinzip (2 Genehmigungen erforderlich)
        </mat-checkbox>
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Abbrechen</button>
    <button mat-flat-button color="primary" (click)="save()" [disabled]="!pos.title">
        Speichern
    </button>
</mat-dialog-actions>
