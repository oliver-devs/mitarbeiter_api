<h2 mat-dialog-title>{{ isEditMode ? 'Abteilung bearbeiten' : 'Neue Abteilung' }}</h2>

<mat-dialog-content>
    <div class="form-container">
        <mat-form-field appearance="outline">
            <mat-label>Abteilungsname</mat-label>
            <input matInput [(ngModel)]="dept.name" placeholder="z.B. IT" />
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Beschreibung</mat-label>
            <textarea matInput [(ngModel)]="dept.description" rows="3"></textarea>
        </mat-form-field>
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Abbrechen</button>
    <button mat-flat-button color="primary" (click)="save()" [disabled]="!dept.name">
        Speichern
    </button>
</mat-dialog-actions>
